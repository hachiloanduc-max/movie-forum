<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>影谈 CineTalk — 发现好电影·分享热评</title>
<style>
:root {
  --bg: #0a0a0a;
  --bg2: #121212;
  --card: #1a1a1a;
  --card-hover: #222;
  --gold: #f5c518;
  --red: #e50914;
  --text: #e8e8e8;
  --text2: #aaa;
  --text3: #666;
  --border: #252525;
  --radius: 14px;
  --shadow: 0 8px 32px rgba(0,0,0,.6);
  --transition: .3s cubic-bezier(.4,0,.2,1);
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:#333;border-radius:3px}

/* HEADER */
.header{position:sticky;top:0;z-index:100;background:rgba(10,10,10,.85);backdrop-filter:blur(24px) saturate(1.5);border-bottom:1px solid var(--border)}
.header-inner{max-width:1480px;margin:0 auto;display:flex;align-items:center;gap:28px;padding:0 36px;height:68px}
.logo{display:flex;align-items:center;gap:10px;font-size:22px;font-weight:800;text-decoration:none;color:#fff;letter-spacing:-.5px}
.logo .icon{width:36px;height:36px;background:linear-gradient(135deg,var(--red),#ff6b35);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px}
.nav{display:flex;gap:4px}
.nav a{color:var(--text2);text-decoration:none;padding:8px 18px;border-radius:22px;font-size:14px;font-weight:500;transition:var(--transition)}
.nav a:hover,.nav a.active{color:#fff;background:rgba(255,255,255,.08)}
.header-right{display:flex;align-items:center;gap:12px;margin-left:auto}
.search-wrap{position:relative}
.search-wrap input{background:var(--card);border:1px solid var(--border);color:var(--text);padding:10px 18px 10px 40px;border-radius:24px;width:240px;font-size:14px;outline:none;transition:var(--transition)}
.search-wrap input:focus{border-color:var(--gold);width:300px;box-shadow:0 0 0 3px rgba(245,197,24,.1)}
.search-wrap input::placeholder{color:var(--text3)}
.search-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:14px}
.btn-sign{background:var(--red);color:#fff;border:none;padding:10px 22px;border-radius:22px;font-size:14px;font-weight:600;cursor:pointer;transition:var(--transition)}
.btn-sign:hover{background:#ff1a25;transform:translateY(-1px);box-shadow:0 4px 16px rgba(229,9,20,.3)}

/* HERO */
.hero{position:relative;height:420px;overflow:hidden;margin:0 36px 36px;border-radius:20px;display:flex;align-items:flex-end}
.hero-bg{position:absolute;inset:0;background:linear-gradient(135deg,#1a0a0a 0%,#0a0a1a 30%,#0a1a0a 70%,#1a1a0a 100%);z-index:0}
.hero-bg::after{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 70% 50%,rgba(229,9,20,.15),transparent 60%),radial-gradient(ellipse at 30% 30%,rgba(245,197,24,.08),transparent 50%)}
.hero-content{position:relative;z-index:1;padding:48px;display:flex;align-items:flex-end;gap:32px;width:100%}
.hero-poster-wrap{flex-shrink:0;width:200px;border-radius:14px;overflow:hidden;box-shadow:0 12px 48px rgba(0,0,0,.5);position:relative}
.hero-poster-wrap img{width:100%;display:block}
.hero-poster-wrap .poster-fallback{width:100%;aspect-ratio:2/3;background:linear-gradient(135deg,#2a1a3a,#1a2a3a);display:flex;align-items:center;justify-content:center;font-size:64px}
.hero-info{flex:1;min-width:0}
.hero-label{display:inline-block;background:var(--red);color:#fff;padding:4px 14px;border-radius:12px;font-size:12px;font-weight:700;margin-bottom:16px;letter-spacing:1px;text-transform:uppercase}
.hero-title{font-size:48px;font-weight:900;margin-bottom:6px;letter-spacing:-1px;line-height:1.1}
.hero-sub{font-size:17px;color:var(--text2);margin-bottom:20px}
.hero-meta{display:flex;gap:16px;align-items:center;margin-bottom:20px}
.hero-rating{display:flex;align-items:center;gap:10px}
.hero-rating .score{font-size:42px;font-weight:900;color:var(--gold)}
.hero-rating .stars{color:var(--gold);font-size:20px}
.hero-rating .count{color:var(--text3);font-size:13px}
.hero-genres{display:flex;gap:8px}
.hero-genres span{padding:6px 14px;background:rgba(255,255,255,.08);border-radius:12px;font-size:13px;border:1px solid var(--border)}
.hero-desc{font-size:14px;color:var(--text2);line-height:1.7;max-width:600px;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.hero-actions{display:flex;gap:12px;margin-top:20px}
.hero-actions button{padding:12px 28px;border-radius:24px;font-size:15px;font-weight:600;cursor:pointer;transition:var(--transition);border:none}
.btn-primary{background:var(--red);color:#fff}
.btn-primary:hover{background:#ff1a25;transform:translateY(-2px);box-shadow:0 6px 20px rgba(229,9,20,.3)}
.btn-secondary{background:rgba(255,255,255,.08);color:var(--text);border:1px solid var(--border)!important}
.btn-secondary:hover{background:rgba(255,255,255,.14)}

/* MAIN */
.main-wrap{max-width:1480px;margin:0 auto;padding:0 36px;display:flex;gap:28px}
.content{flex:1;min-width:0}
.sidebar{width:300px;flex-shrink:0}

/* SECTION */
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.section-header h2{font-size:22px;font-weight:700;display:flex;align-items:center;gap:10px}
.section-header h2 .dot{width:8px;height:8px;background:var(--red);border-radius:50%}
.section-header .more{color:var(--text3);text-decoration:none;font-size:13px;transition:var(--transition)}
.section-header .more:hover{color:var(--gold)}
.filters{display:flex;gap:8px;margin-bottom:24px}
.filter-btn{padding:8px 18px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--text2);font-size:13px;cursor:pointer;transition:var(--transition)}
.filter-btn:hover,.filter-btn.active{background:var(--red);color:#fff;border-color:var(--red)}

/* MOVIE GRID */
.movie-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:18px;margin-bottom:40px}
.movie-card{background:var(--card);border-radius:var(--radius);overflow:hidden;cursor:pointer;transition:var(--transition);border:1px solid transparent;position:relative}
.movie-card:hover{transform:translateY(-8px);box-shadow:var(--shadow);border-color:var(--border);background:var(--card-hover)}
.movie-card .rank{position:absolute;top:12px;left:12px;z-index:2;width:28px;height:28px;background:rgba(0,0,0,.7);backdrop-filter:blur(8px);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;color:var(--gold)}
.movie-poster{width:100%;aspect-ratio:2/3;overflow:hidden;position:relative;background:var(--bg2)}
.movie-poster img{width:100%;height:100%;object-fit:cover;transition:transform .5s}
.movie-card:hover .movie-poster img{transform:scale(1.08)}
.movie-poster .fallback{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:52px;background:linear-gradient(135deg,#1a1a2e,#16213e)}
.movie-body{padding:16px}
.movie-body .title{font-size:15px;font-weight:700;margin-bottom:6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.movie-body .meta{display:flex;align-items:center;gap:10px;font-size:12px;color:var(--text2)}
.movie-body .meta .rating{color:var(--gold);font-weight:700;font-size:13px}
.movie-body .meta .year{color:var(--text3)}
.movie-body .meta .genre-tag{padding:2px 8px;background:rgba(255,255,255,.06);border-radius:8px;font-size:11px;border:1px solid var(--border)}
.movie-body .brief{font-size:12px;color:var(--text3);margin-top:8px;line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}

/* SIDEBAR */
.sb-card{background:var(--card);border-radius:var(--radius);padding:22px;margin-bottom:20px;border:1px solid var(--border)}
.sb-card h3{font-size:15px;font-weight:700;margin-bottom:16px;display:flex;align-items:center;gap:8px}
.sb-card h3 .emoji{font-size:18px}
.disc-item{padding:14px 0;border-bottom:1px solid var(--border);cursor:pointer;transition:var(--transition)}
.disc-item:last-child{border-bottom:none}
.disc-item:hover .disc-title{color:var(--gold)}
.disc-item .disc-title{font-size:13px;font-weight:600;margin-bottom:6px;transition:color .2s}
.disc-item .disc-meta{font-size:11px;color:var(--text3);display:flex;gap:10px}
.disc-item .disc-tag{display:inline-block;padding:2px 8px;background:rgba(229,9,20,.15);color:var(--red);border-radius:6px;font-size:10px;font-weight:600;margin-top:6px}
.rank-list{counter-reset:rank;list-style:none}
.rank-list li{counter-increment:rank;display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--border);font-size:13px;cursor:pointer;transition:var(--transition)}
.rank-list li:last-child{border-bottom:none}
.rank-list li:hover{color:var(--gold)}
.rank-list li::before{content:counter(rank);width:24px;height:24px;background:var(--bg2);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;flex-shrink:0}
.rank-list li:nth-child(1)::before{background:var(--gold);color:#000}
.rank-list li:nth-child(2)::before{background:#c0c0c0;color:#000}
.rank-list li:nth-child(3)::before{background:#cd7f32;color:#000}

/* FEATURED REVIEW */
.featured-review{padding:28px;background:linear-gradient(135deg,var(--card),#1a1520);border-radius:var(--radius);margin-bottom:40px;border:1px solid var(--border);position:relative;overflow:hidden}
.featured-review::before{content:'\201C';position:absolute;top:-10px;left:20px;font-size:120px;color:rgba(255,255,255,.02);font-family:Georgia,serif;line-height:1}
.featured-review .review-header{display:flex;align-items:center;gap:14px;margin-bottom:16px;position:relative}
.featured-review .avatar{width:48px;height:48px;border-radius:50%;background:linear-gradient(135deg,#667eea,#764ba2);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.featured-review .reviewer{font-weight:700;font-size:15px}
.featured-review .reviewer-sub{font-size:12px;color:var(--text3)}
.featured-review .review-text{font-size:15px;line-height:1.8;color:var(--text2);margin-bottom:16px;position:relative}
.featured-review .review-footer{display:flex;gap:20px;font-size:13px;color:var(--text3)}

/* MODAL */
.modal-overlay{display:none;position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.85);backdrop-filter:blur(8px);justify-content:center;align-items:center;padding:20px}
.modal-overlay.active{display:flex}
.modal{background:var(--bg2);border-radius:20px;width:100%;max-width:820px;max-height:90vh;overflow-y:auto;position:relative;border:1px solid var(--border)}
.modal-close{position:sticky;top:16px;float:right;z-index:10;width:40px;height:40px;background:rgba(255,255,255,.1);border:none;color:#fff;border-radius:50%;cursor:pointer;font-size:18px;transition:var(--transition);margin-right:16px}
.modal-close:hover{background:var(--red)}
.modal-inner{padding:32px}
.modal-grid{display:flex;gap:28px}
.modal-poster-wrap{width:220px;flex-shrink:0;border-radius:14px;overflow:hidden;box-shadow:0 8px 32px rgba(0,0,0,.5)}
.modal-poster-wrap img{width:100%;display:block}
.modal-poster-wrap .poster-fallback{aspect-ratio:2/3;background:linear-gradient(135deg,#2a1a3a,#1a2a3a);display:flex;align-items:center;justify-content:center;font-size:64px}
.modal-detail{flex:1}
.modal-detail h2{font-size:30px;font-weight:900;margin-bottom:4px}
.modal-detail .en-title{font-size:15px;color:var(--text3);margin-bottom:16px}
.modal-detail .info-tags{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px}
.modal-detail .info-tags span{padding:6px 14px;background:rgba(255,255,255,.06);border-radius:12px;font-size:13px;border:1px solid var(--border)}
.modal-rating{display:flex;align-items:center;gap:16px;margin-bottom:20px;padding:20px;background:var(--card);border-radius:14px}
.modal-rating .big-score{font-size:48px;font-weight:900;color:var(--gold);line-height:1}
.modal-rating .rating-info{font-size:13px;color:var(--text2)}
.modal-rating .rating-info strong{display:block;font-size:15px;color:var(--text);margin-bottom:2px}
.modal-detail .synopsis{font-size:14px;line-height:1.9;color:var(--text2);margin-bottom:20px}
.modal-comments{margin-top:24px;border-top:1px solid var(--border);padding-top:24px}
.modal-comments h3{font-size:17px;margin-bottom:16px}
.comment-input{display:flex;gap:10px;margin-bottom:16px}
.comment-input input{flex:1;background:var(--card);border:1px solid var(--border);color:var(--text);padding:12px 18px;border-radius:24px;font-size:14px;outline:none;transition:var(--transition)}
.comment-input input:focus{border-color:var(--gold)}
.comment-input button{background:var(--red);color:#fff;border:none;padding:12px 22px;border-radius:24px;font-size:14px;font-weight:600;cursor:pointer;transition:var(--transition)}
.comment-input button:hover{background:#ff1a25}
.comment-item{padding:14px 0;border-bottom:1px solid var(--border)}
.comment-item:last-child{border-bottom:none}
.comment-item .c-user{font-weight:600;font-size:14px;margin-bottom:4px}
.comment-item .c-text{font-size:13px;color:var(--text2);line-height:1.6}
.comment-item .c-time{font-size:11px;color:var(--text3);margin-top:4px}

/* FOOTER */
.footer{text-align:center;padding:32px;border-top:1px solid var(--border);color:var(--text3);font-size:12px;margin-top:40px}

@media(max-width:1200px){.movie-grid{grid-template-columns:repeat(3,1fr)}.sidebar{display:none}}
@media(max-width:768px){.movie-grid{grid-template-columns:repeat(2,1fr)}.hero{height:auto}.hero-content{flex-direction:column;align-items:center;text-align:center}.hero-poster-wrap{width:140px}.hero-title{font-size:28px}.main-wrap{padding:0 16px}.header-inner{padding:0 16px}.search-wrap input{width:140px}.search-wrap input:focus{width:180px}}
</style>
</head>
<body>

<header class="header">
<div class="header-inner">
  <a href="#" class="logo"><span class="icon">🎬</span>影谈 CineTalk</a>
  <nav class="nav">
    <a href="#" class="active">首页</a>
    <a href="#">热映</a>
    <a href="#">排行榜</a>
    <a href="#">讨论区</a>
    <a href="#">片单</a>
  </nav>
  <div class="header-right">
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input type="text" id="searchInput" placeholder="搜索电影、导演、演员…">
    </div>
    <button class="btn-sign">登录</button>
  </div>
</div>
</header>

<section class="hero">
  <div class="hero-bg"></div>
  <div class="hero-content" id="heroContent"></div>
</section>

<div class="main-wrap">
  <div class="content">
    <div class="section-header">
      <h2><span class="dot"></span>正在热映</h2>
      <div class="filters" id="filters"></div>
    </div>
    <div class="movie-grid" id="movieGrid"></div>

    <div class="featured-review" id="featuredReview"></div>

    <div class="section-header">
      <h2><span class="dot"></span>热门讨论</h2>
      <a href="#" class="more">浏览全部 →</a>
    </div>
    <div id="discussionList" style="margin-bottom:40px"></div>
  </div>

  <aside class="sidebar">
    <div class="sb-card">
      <h3><span class="emoji">🏆</span>豆瓣 Top 10</h3>
      <ol class="rank-list" id="topRank"></ol>
    </div>
    <div class="sb-card">
      <h3><span class="emoji">💬</span>最新讨论</h3>
      <div id="sideDiscussions"></div>
    </div>
  </aside>
</div>

<div class="modal-overlay" id="modal">
  <div class="modal">
    <button class="modal-close" id="modalClose">✕</button>
    <div class="modal-inner" id="modalInner"></div>
  </div>
</div>

<footer class="footer">
  <p>© 2026 影谈 CineTalk · 电影数据来源：豆瓣 / TMDB · 演示项目</p>
</footer>

<script>
// ========= 真实电影数据 =========
const movies = [
  {id:1,title:"肖申克的救赎",en:"The Shawshank Redemption",year:1994,director:"弗兰克·德拉邦特",genres:"剧情 / 犯罪",rating:9.7,votes:"308万",poster:"https://image.tmdb.org/t/p/w500/9cqNxx0GxF0bflZmeSMuL5tnGzr.jpg",desc:"银行家安迪·杜佛兰因被误判谋杀妻子及其情人，被判无期徒刑，关进了肖申克监狱。在监狱中，他与囚犯瑞德成为挚友，凭借才智和毅力，用一柄小锤凿了20年墙壁，最终逃出生天。这部电影关于希望、自由和友谊，是全球影迷心中无法超越的经典。",cast:"蒂姆·罗宾斯 / 摩根·弗里曼"},
  {id:2,title:"星际穿越",en:"Interstellar",year:2014,director:"克里斯托弗·诺兰",genres:"科幻 / 冒险 / 剧情",rating:9.4,votes:"197万",poster:"https://image.tmdb.org/t/p/w500/gEU2QniE6E77NI6lCU6MxlNBvIx.jpg",desc:"近未来的地球黄沙遍野，农作物相继枯萎灭绝。前NASA宇航员库珀被选中，穿越虫洞前往遥远的星系寻找人类的新家园。在五维时空的尽头，爱成为了穿越维度的唯一密码。诺兰的科幻史诗，科学与情感完美交织。",cast:"马修·麦康纳 / 安妮·海瑟薇 / 杰西卡·查斯坦"},
  {id:3,title:"千与千寻",en:"Spirited Away",year:2001,director:"宫崎骏",genres:"动画 / 奇幻 / 冒险",rating:9.4,votes:"238万",poster:"https://image.tmdb.org/t/p/w500/39wmItIWsg5sZMyRUHLkWBcuVCM.jpg",desc:"10岁的少女千寻随父母搬家途中，误入一个神灵世界。父母因贪吃变成了猪，千寻必须在汤婆婆的浴场工作，才能拯救他们。白龙、无脸男、锅炉爷爷……在这场奇幻旅程中，千寻学会了勇敢和善良。宫崎骏的巅峰之作。",cast:"柊瑠美 / 入野自由 / 夏木真理"},
  {id:4,title:"盗梦空间",en:"Inception",year:2010,director:"克里斯托弗·诺兰",genres:"科幻 / 悬疑 / 动作",rating:9.4,votes:"222万",poster:"https://image.tmdb.org/t/p/w500/oYuLEt3zVCKq57qu2F8dT7NIa6f.jpg",desc:"柯布是一名"盗梦者"，能够在人们梦境中窃取秘密。为了回到孩子身边，他接下了一个不可能的任务：不是偷走一个想法，而是在目标潜意识中植入一个想法。多层梦境嵌套，虚实之间令人窒息——陀螺到底停了吗？",cast:"莱昂纳多 / 渡边谦 / 约瑟夫·高登-莱维特"},

// ========= 渲染 =========
function heroBanner(){
  const m = movies[1]; // 星际穿越作为hero
  const hc = document.getElementById('heroContent');
  hc.innerHTML = `
    <div class="hero-poster-wrap">
      <img src="${m.poster}" alt="${m.title}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'" loading="lazy" referrerpolicy="no-referrer">
      <div class="poster-fallback" style="display:none">🚀</div>
    </div>
    <div class="hero-info">
      <div class="hero-label">🎬 本周推荐</div>
      <div class="hero-title">${m.title}</div>
      <div class="hero-sub">${m.en} · ${m.director} · ${m.year}</div>
      <div class="hero-meta">
        <div class="hero-rating">
          <span class="score">${m.rating}</span>
          <div><div class="stars">★★★★★</div><span class="count">${m.votes}人评价</span></div>
        </div>
      </div>
      <div class="hero-genres">${m.genres.split(' / ').map(g=>`<span>${g}</span>`).join('')}</div>
      <div class="hero-desc">${m.desc}</div>
      <div class="hero-actions">
        <button class="btn-primary" onclick="openDetail(${m.id})">查看详情</button>
        <button class="btn-secondary">✚ 加入片单</button>
      </div>
    </div>`;
}

function getStars(r){ const s=r/2; let h=''; for(let i=1;i<=5;i++) h+= i<=Math.floor(s)?'★':(i-0.5<=s?'⭑':'☆'); return h; }

function renderMovies(filter=null){
  const list = filter||movies;
  const grid = document.getElementById('movieGrid');
  grid.innerHTML = list.map((m,i)=>(`
    <div class="movie-card" onclick="openDetail(${m.id})">
      <div class="rank">${i+1}</div>
      <div class="movie-poster">
        <img src="${m.poster}" alt="${m.title}" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'" referrerpolicy="no-referrer">
        <div class="fallback" style="display:none">🎞️</div>
      </div>
      <div class="movie-body">
        <div class="title">${m.title}</div>
        <div class="meta">
          <span class="rating">★ ${m.rating}</span>
          <span class="year">${m.year}</span>
          <span class="genre-tag">${m.genres.split(' / ')[0]}</span>
        </div>
        <div class="brief">${m.desc.slice(0,60)}…</div>
      </div>
    </div>
  `)).join('');
}

function renderFilters(){
  const genres = ['全部',...[...new Set(movies.flatMap(m=>m.genres.split(' / ')))]];
  document.getElementById('filters').innerHTML = genres.map((g,i)=>`<button class="filter-btn ${i===0?'active':''}" onclick="filterMovies('${g}')">${g}</button>`).join('');
}

function renderDiscussions(){
  document.getElementById('discussionList').innerHTML = discussions.map(d=>`
    <div class="featured-review" style="margin-bottom:16px;cursor:pointer" onclick="openDiscussion(${d.id})">
      <div class="review-header">
        <div class="avatar">${d.avatar}</div>
        <div><div class="reviewer">${d.user}</div><div class="reviewer-sub">${d.time}</div></div>
        <span style="margin-left:auto;padding:4px 12px;background:rgba(245,197,24,.15);color:var(--gold);border-radius:10px;font-size:11px;font-weight:600">${d.tag}</span>
      </div>
      <h3 style="font-size:17px;margin-bottom:10px">${d.title}</h3>
      <div class="review-text" style="margin-bottom:8px">${d.excerpt}</div>
      <div class="review-footer">💬 ${d.replies}回复 · 👍 ${d.likes}赞</div>
    </div>
  `).join('');
}

function renderFeaturedReview(){
  const r = reviews[Math.floor(Math.random()*reviews.length)];
  document.getElementById('featuredReview').innerHTML = `
    <div class="review-header">
      <div class="avatar">${r.avatar}</div>
      <div><div class="reviewer">${r.user}</div><div class="reviewer-sub">${r.sub}</div></div>
    </div>
    <div class="review-text">${r.text}</div>
    <div class="review-footer">👍 ${r.likes} · 💬 ${r.comments}条回复</div>`;
}

function renderSidebar(){
  document.getElementById('topRank').innerHTML = movies.slice(0,10).map(m=>`<li onclick="openDetail(${m.id})"><span style="flex:1">${m.title}</span><span style="color:var(--gold);font-size:12px;font-weight:700">★${m.rating}</span></li>`).join('');
  document.getElementById('sideDiscussions').innerHTML = discussions.slice(0,4).map(d=>`
    <div class="disc-item" onclick="openDiscussion(${d.id})"><div class="disc-title">${d.title.slice(0,30)}…</div><div class="disc-meta"><span>💬 ${d.replies}</span><span>👍 ${d.likes}</span></div><span class="disc-tag">${d.tag}</span></div>
  `).join('');
}

// ========= 交互 =========
function filterMovies(g){ 
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  event.target.classList.add('active');
  renderMovies(g==='全部'?null:movies.filter(m=>m.genres.includes(g)));
}

document.getElementById('searchInput').addEventListener('input',function(){
  const q = this.value.trim().toLowerCase();
  if(!q){renderMovies();return;}
  renderMovies(movies.filter(m=>m.title.includes(q)||m.en.toLowerCase().includes(q)||m.director.includes(q)||m.genres.includes(q)||m.cast.includes(q)));
});

// 电影详情Modal
const comments={};
function openDetail(id){
  const m = movies.find(x=>x.id===id); if(!m) return;
  const cmts = comments[id]||[];
  document.getElementById('modalInner').innerHTML = `
    <div class="modal-grid">
      <div class="modal-poster-wrap">
        <img src="${m.poster}" alt="${m.title}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'" loading="lazy" referrerpolicy="no-referrer">
        <div class="poster-fallback" style="display:none">🎞️</div>
      </div>
      <div class="modal-detail">
        <h2>${m.title}</h2>
        <div class="en-title">${m.en} · ${m.year}</div>
        <div class="info-tags">${m.genres.split(' / ').map(g=>`<span>${g}</span>`).join('')}<span>${m.director}</span></div>
        <div class="modal-rating">
          <span class="big-score">${m.rating}</span>
          <div class="rating-info"><strong>${getStars(m.rating)}</strong>${m.votes}人评价</div>
        </div>
        <p class="synopsis">${m.desc}</p>
        <p style="font-size:13px;color:var(--text3)">🎭 主演：${m.cast}</p>
      </div>
    </div>
    <div class="modal-comments">
      <h3>💬 讨论区 (${cmts.length})</h3>
      <div class="comment-input">
        <input type="text" id="commentInput" placeholder="写下你的想法…">
        <button onclick="addCmt(${id})">发布</button>
      </div>
      <div id="commentList">${cmts.map(c=>`<div class="comment-item"><div class="c-user">${c.user}</div><div class="c-text">${c.text}</div><div class="c-time">${c.time}</div></div>`).join('')}</div>
    </div>`;
  document.getElementById('modal').classList.add('active');
}

function addCmt(id){
  const inp=document.getElementById('commentInput');const t=inp.value.trim();if(!t)return;
  if(!comments[id])comments[id]=[];
  comments[id].push({user:'游客影迷',text:t,time:'刚刚'});
  openDetail(id);
}

function openDiscussion(id){
  const d = discussions.find(x=>x.id===id);if(!d)return;
  const cmts=comments[id]||[];
  document.getElementById('modalInner').innerHTML=`
    <div class="review-header" style="margin-bottom:20px">
      <div class="avatar">${d.avatar}</div><div><div class="reviewer">${d.user}</div><div class="reviewer-sub">${d.time}</div></div>
      <span style="margin-left:auto;padding:4px 12px;background:rgba(245,197,24,.15);color:var(--gold);border-radius:10px;font-size:11px;font-weight:600">${d.tag}</span></div>
    <h2 style="margin-bottom:14px">${d.title}</h2>
    <p style="font-size:15px;line-height:1.9;color:var(--text2);margin-bottom:20px">${d.excerpt}</p>
    <div style="display:flex;gap:16px;font-size:13px;color:var(--text3);margin-bottom:24px">💬 ${d.replies}回复 · 👍 ${d.likes}赞</div>
    <div class="modal-comments">
      <h3>回复 (${cmts.length})</h3>
      <div class="comment-input"><input type="text" id="commentInput" placeholder="写下你的回复…"><button onclick="addCmt(${id})">回复</button></div>
      <div id="commentList">${cmts.map(c=>`<div class="comment-item"><div class="c-user">${c.user}</div><div class="c-text">${c.text}</div><div class="c-time">${c.time}</div></div>`).join('')}</div></div>`;
  document.getElementById('modal').classList.add('active');
}

document.getElementById('modal').addEventListener('click',function(e){if(e.target===this)closeModal();});
document.getElementById('modalClose').addEventListener('click',closeModal);
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal();});
function closeModal(){document.getElementById('modal').classList.remove('active');}

// 初始化
heroBanner();
renderFilters();
renderMovies();
renderDiscussions();
renderFeaturedReview();
renderSidebar();
